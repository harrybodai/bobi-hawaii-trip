<html lang="zh-CN">
<head>

  <title>Bobi Big Island 2026</title>
  <style>
    :root { color-scheme: light; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f7faf8; color: #17201a; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: radial-gradient(circle at top, #e6f4f1 0, #f7faf8 42%, #ffffff 100%); }
    .gate { width: min(420px, calc(100vw - 36px)); background: rgba(255,255,255,.88); border: 1px solid rgba(20, 40, 30, .12); border-radius: 24px; box-shadow: 0 24px 80px rgba(15, 46, 34, .14); padding: 28px; }
    h1 { margin: 0 0 8px; font-size: 28px; letter-spacing: 0; }
    p { margin: 0 0 18px; color: #52615a; line-height: 1.55; }
    label { display: block; margin-bottom: 8px; font-weight: 700; }
    input { width: 100%; box-sizing: border-box; border: 1px solid #cbd8d2; border-radius: 14px; padding: 14px 16px; font: inherit; }
    button { width: 100%; margin-top: 14px; border: 0; border-radius: 14px; padding: 14px 16px; background: #1d7f64; color: white; font: inherit; font-weight: 800; cursor: pointer; }
    button:disabled { opacity: .65; cursor: wait; }
    .status { min-height: 22px; margin-top: 12px; color: #b42318; font-weight: 700; }
    .hint { font-size: 13px; color: #6a7871; margin-top: 14px; }
  </style>
</head>

    const saltBase64='eIX3SWFTFuE2XrC4ga9PTQ==';
    const ivBase64='skGeIqgdJJg5+0iI';
    const iterations=250000;
    const cacheKey='bobiTripUnlockedHtmlV2';
    const cacheExpiryKey='bobiTripUnlockedUntilV2';
    const cacheDurationMs=2*60*60*1000;
    const statusEl=document.getElementById('status');
    const form=document.getElementById('unlockForm');
    const button=document.getElementById('unlockButton');
    const input=document.getElementById('password');
    function fromBase64(value){const binary=atob(value);const bytes=new Uint8Array(binary.length);for(let i=0;i<binary.length;i++)bytes[i]=binary.charCodeAt(i);return bytes;}
    async function getKey(password){const material=await crypto.subtle.importKey('raw',new TextEncoder().encode(password),'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt:fromBase64(saltBase64),iterations,hash:'SHA-256'},material,{name:'AES-GCM',length:256},false,['decrypt']);}
    async function gunzip(bytes){if('DecompressionStream' in window){const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));return await new Response(stream).text();}throw new Error('当前浏览器不支持解压，请换 Chrome / Safari 新版本打开。');}
    async function unlock(password){const data=fromBase64(encryptedPayload);const cipher=data.slice(0,data.length);const key=await getKey(password);const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:fromBase64(ivBase64)},key,cipher);return gunzip(new Uint8Array(plain));}
    function openHtml(html){document.open();document.write(html);document.close();}
    function rememberHtml(html){try{localStorage.setItem(cacheKey,html);localStorage.setItem(cacheExpiryKey,String(Date.now()+cacheDurationMs));}catch(error){}}
    function tryOpenCached(){try{const expiry=Number(localStorage.getItem(cacheExpiryKey)||0);const html=localStorage.getItem(cacheKey);if(html&&expiry>Date.now()){openHtml(html);return true;}if(expiry&&expiry<=Date.now()){localStorage.removeItem(cacheKey);localStorage.removeItem(cacheExpiryKey);}}catch(error){}return false;}
    if(!tryOpenCached()){
      form.addEventListener('submit',async(event)=>{event.preventDefault();statusEl.textContent='';button.disabled=true;button.textContent='正在打开...';try{const html=await unlock(input.value);rememberHtml(html);openHtml(html);}catch(error){statusEl.textContent='密码不对，或者浏览器不支持。';button.disabled=false;button.textContent='打开行程';input.select();}});
