    async function decompressGzip(bytes){if(!('DecompressionStream' in window))throw new Error('当前浏览器不支持解压缩，请用 Safari / Chrome / 微信内置浏览器打开 HTTPS 链接。');const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));return await new Response(stream).text()}
    async function unlock(password){if(!crypto.subtle)throw new Error('当前浏览器不支持本地解密，请用 Safari / Chrome / 微信内置浏览器打开 HTTPS 链接。');const key=await deriveKey(password,fromBase64(saltBase64));const combined=fromBase64(encryptedPayload);const decrypted=await crypto.subtle.decrypt({name:'AES-GCM',iv:fromBase64(ivBase64)},key,combined);return await decompressGzip(new Uint8Array(decrypted))}
    document.getElementById('unlockForm').addEventListener('submit',async event=>{event.preventDefault();const button=document.getElementById('unlockButton');const message=document.getElementById('message');button.disabled=true;button.textContent='正在打开...';message.textContent='';try{const html=await unlock(document.getElementById('password').value);document.open();document.write(html);document.close()}catch(error){message.textContent='密码不对，或当前浏览器不支持解密。';button.disabled=false;button.textContent='打开行程'}});
  </script>
